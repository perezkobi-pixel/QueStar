<title>קווסטאר</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12132a;
  --bg-deep:#0a0b1c;
  --surface:#1d1f44;
  --surface-2:#272a59;
  --surface-3:#323571;
  --border:#34376b;
  --gold:#ffc857;
  --gold-deep:#e0a930;
  --cyan:#4ecdc4;
  --cyan-deep:#2fa39a;
  --pink:#ff6f9c;
  --pink-deep:#e0507e;
  --blue:#5b8def;
  --blue-deep:#3f6fd4;
  --purple:#9b8cff;
  --purple-deep:#7a68e8;
  --danger:#ff6b6b;
  --text:#f4f3ff;
  --text-dim:#a9abd1;
  --text-faint:#6f72a0;
  --r-lg:24px;
  --r-md:16px;
  --r-sm:10px;
  --font-display:'Suez One', serif;
  --font-body:'Rubik', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg-deep);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  position:relative;
  -webkit-tap-highlight-color:transparent;
}
body::before, body::after{
  content:'';
  position:fixed; inset:0;
  pointer-events:none;
  background-image:radial-gradient(circle, rgba(255,255,255,.9) 1px, transparent 1.6px);
  background-size:26px 26px;
  opacity:.12;
  z-index:0;
}
body::after{
  background-size:46px 46px;
  background-position:14px 20px;
  opacity:.08;
  animation:twinkle 5s ease-in-out infinite alternate;
}
@keyframes twinkle{ from{opacity:.05;} to{opacity:.16;} }
@media (prefers-reduced-motion:reduce){
  body::after{animation:none;}
}
button{font-family:inherit;}
input{font-family:inherit;}
.app-shell{
  position:relative;
  z-index:1;
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  background:linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
  display:flex;
  flex-direction:column;
  box-shadow:0 0 80px rgba(0,0,0,.55);
  overflow-x:hidden;
}
.app-content{
  flex:1 1 auto;
  padding:16px 16px 100px;
}
.center-screen{
  flex:1 1 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  text-align:center;
  min-height:100vh;
}
.hidden{display:none !important;}

/* ---------- typography helpers ---------- */
.logo{
  font-family:var(--font-display);
  font-size:42px;
  color:var(--gold);
  text-shadow:0 0 24px rgba(255,200,87,.45);
  letter-spacing:1px;
  margin:0 0 4px;
}
.login-logo{
  width:168px; height:auto; object-fit:contain;
  margin-bottom:8px;
  filter:drop-shadow(0 10px 22px rgba(255,170,40,.30));
}
.subtitle{color:var(--text-dim); font-size:15px; margin:0 0 28px;}
.section-title{
  font-family:var(--font-display);
  font-size:22px;
  margin:4px 0 14px;
  color:var(--text);
}

/* ---------- buttons ---------- */
.btn{
  font-weight:700;
  border-radius:var(--r-md);
  padding:12px 18px;
  border:none;
  cursor:pointer;
  transition:transform .12s, filter .12s, opacity .12s;
  font-size:15px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.btn:active{transform:scale(.96);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-deep)); color:#2a1d00;}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),var(--cyan-deep)); color:#06302c;}
.btn-purple{background:linear-gradient(135deg,var(--purple),var(--purple-deep)); color:#1b1140;}
.btn-outline{background:transparent; border:2px solid var(--border); color:var(--text);}
.btn-disabled{background:var(--surface-2); color:var(--text-faint); cursor:not-allowed;}
.btn-danger{background:rgba(255,107,107,.14); color:var(--danger); border:1px solid rgba(255,107,107,.4);}
.btn-block{width:100%;}
.btn-sm{padding:7px 12px; font-size:13px; border-radius:var(--r-sm);}
.icon-btn{
  background:var(--surface-2); border:none; color:var(--text-dim);
  width:38px; height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.icon-btn svg{width:18px;height:18px;}
.icon-btn:active{transform:scale(.92);}

/* ---------- login screen ---------- */
.profile-row{display:flex; gap:16px; justify-content:center; margin-bottom:18px; flex-wrap:wrap;}
.profile-pod{
  width:128px;
  background:var(--surface);
  border:2px solid var(--border);
  border-radius:var(--r-lg);
  padding:16px 10px 14px;
  cursor:pointer;
  transition:transform .15s, border-color .15s;
}
.profile-pod:active{transform:scale(.95);}
.profile-pod .avatar-wrap{width:72px;height:72px;margin:0 auto 10px;}
.profile-pod .pname{font-weight:700; font-size:16px;}
.profile-pod.pink{border-color:rgba(255,111,156,.4);}
.profile-pod.pink:active, .profile-pod.pink:hover{border-color:var(--pink);}
.profile-pod.blue{border-color:rgba(91,141,239,.4);}
.profile-pod.blue:active, .profile-pod.blue:hover{border-color:var(--blue);}
.parent-pod{
  margin-top:10px;
  display:inline-flex; align-items:center; gap:10px;
  background:var(--surface);
  border:2px solid rgba(155,140,255,.35);
  border-radius:999px;
  padding:10px 22px;
  cursor:pointer;
  color:var(--text-dim);
  font-weight:600;
}
.parent-pod:active{transform:scale(.96);}
.parent-pod svg{width:20px;height:20px; color:var(--purple);}

/* ---------- passcode screen ---------- */
.passcode-title{font-weight:700; font-size:18px; margin-bottom:6px;}
.passcode-sub{color:var(--text-dim); font-size:13px; margin-bottom:22px;}
.dots-row{display:flex; gap:14px; justify-content:center; margin-bottom:28px;}
.pdot{width:16px;height:16px;border-radius:50%; border:2px solid var(--border); background:transparent; transition:background .15s, border-color .15s;}
.pdot.filled{background:var(--gold); border-color:var(--gold);}
.pdot.err{border-color:var(--danger); background:var(--danger);}
.keypad{display:grid; grid-template-columns:repeat(3,72px); gap:14px; justify-content:center;}
.key{
  width:72px; height:72px; border-radius:50%;
  background:var(--surface); border:1px solid var(--border);
  color:var(--text); font-size:24px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
.key:active{transform:scale(.93); background:var(--surface-2);}
.key.ghost{background:transparent; border:none; cursor:default;}
.err-msg{color:var(--danger); font-size:13px; height:18px; margin-top:6px;}
.room-code{
  font-family:monospace; font-size:13px; font-weight:700; letter-spacing:0;
  background:var(--surface-2); border:1px dashed var(--border); border-radius:var(--r-sm);
  padding:12px; text-align:center; word-break:break-all; color:var(--gold); direction:ltr;
}
.setup-hint{color:var(--text-dim); font-size:13px; line-height:1.6; margin:14px 0; max-width:340px;}

/* ---------- header / tab bar ---------- */
.app-header{
  flex:0 0 auto;
  display:flex; align-items:center; gap:12px;
  padding:14px 16px;
  position:sticky; top:0; z-index:5;
  background:rgba(18,19,42,.92);
  backdrop-filter:blur(6px);
  border-bottom:1px solid var(--border);
}
.app-header .avatar-wrap{width:46px;height:46px; flex:0 0 auto;}
.header-name{font-weight:700; font-size:16px;}
.header-stars{
  display:flex; align-items:center; gap:4px;
  color:var(--gold); font-weight:800; font-size:14px;
  background:rgba(255,200,87,.1); padding:4px 10px; border-radius:999px;
  margin-top:2px;
}
.header-stars svg{width:13px;height:13px;}
.header-spacer{flex:1 1 auto;}

.tab-bar{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  display:flex;
  background:rgba(24,26,54,.97);
  backdrop-filter:blur(8px);
  border-top:1px solid var(--border);
  z-index:6;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
.tab-item{
  flex:1 1 0; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:8px 2px; border-radius:14px; cursor:pointer; color:var(--text-faint);
  position:relative;
}
.tab-item svg{width:21px;height:21px;}
.tab-item.active{color:var(--gold);}
.tab-item span{font-size:11px; font-weight:600;}
.tab-badge{
  position:absolute; top:2px; right:18%;
  background:var(--danger); color:#fff; font-size:10px; font-weight:800;
  min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center;
  padding:0 3px;
}

/* ---------- cards / lists ---------- */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:16px;
  margin-bottom:14px;
}
.cat-card{padding:0; overflow:hidden;}
.cat-head{
  display:flex; align-items:center; gap:12px;
  padding:14px 16px; cursor:pointer;
}
.cat-icon{
  width:38px;height:38px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface-2); color:var(--cyan); flex:0 0 auto;
}
.cat-icon svg{width:19px;height:19px;}
.cat-name{font-weight:700; font-size:15px;}
.pip-row{display:flex; gap:4px; margin-top:5px;}
.pip{width:8px;height:8px;border-radius:50%; background:var(--surface-3);}
.pip.filled{background:var(--gold);}
.cat-chevron{margin-right:auto; color:var(--text-faint); transition:transform .2s;}
.cat-chevron svg{width:16px;height:16px;}
.cat-chevron.open{transform:rotate(180deg);}
.cat-body{padding:0 14px 12px;}
.task-row{
  display:flex; align-items:center; gap:10px;
  padding:10px 4px; border-top:1px solid var(--border);
}
.task-name{flex:1 1 auto; font-size:14px;}
.task-pts{
  font-size:12px; font-weight:800; color:var(--gold);
  background:rgba(255,200,87,.12); border-radius:999px; padding:3px 9px;
  flex:0 0 auto; white-space:nowrap;
}
.task-action{flex:0 0 auto;}

/* ---------- stats ---------- */
.total-box{text-align:center; padding:22px 16px;}
.total-num{
  font-family:var(--font-display); font-size:50px; color:var(--gold);
  text-shadow:0 0 22px rgba(255,200,87,.4); line-height:1;
}
.total-lbl{color:var(--text-dim); font-size:13px; margin-top:6px;}
.bar-track{height:18px; border-radius:999px; background:var(--surface-2); overflow:hidden; margin:8px 0;}
.bar-fill{height:100%; border-radius:999px; background:linear-gradient(90deg,var(--gold-deep),var(--gold)); transition:width .5s ease;}
.day-row{display:flex; align-items:center; gap:10px; padding:8px 0;}
.day-date{font-size:12px; color:var(--text-dim); width:64px; flex:0 0 auto;}
.day-bar{flex:1 1 auto;}
.day-val{font-size:12px; font-weight:700; color:var(--gold); width:64px; text-align:left; flex:0 0 auto;}

/* ---------- avatars ---------- */
.avatar-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
.avatar-card{
  background:var(--surface); border-radius:var(--r-md); padding:10px 6px;
  text-align:center; border:2px solid transparent;
}
.avatar-card.equipped{border-color:var(--gold); box-shadow:0 0 18px rgba(255,200,87,.3);}
.avatar-card.locked .avatar-wrap{opacity:.45; filter:grayscale(.4);}
.avatar-wrap{width:64px;height:64px;margin:0 auto 8px;}
.avatar-name{font-size:12px; font-weight:700; margin-bottom:4px; min-height:30px; display:flex; align-items:center; justify-content:center;}
.avatar-cost{font-size:11px; color:var(--gold); font-weight:700; margin-bottom:6px;}
.avatar-tag{font-size:11px; color:var(--cyan); font-weight:700; margin-bottom:6px;}

/* ---------- prizes ---------- */
.prize-card{display:flex; align-items:center; gap:12px;}
.prize-icon{
  width:44px;height:44px;border-radius:14px; flex:0 0 auto;
  background:rgba(255,200,87,.12); color:var(--gold);
  display:flex; align-items:center; justify-content:center;
}
.prize-icon svg{width:21px;height:21px;}
.prize-info{flex:1 1 auto;}
.prize-name{font-weight:700; font-size:14.5px;}
.prize-cost{font-size:12.5px; color:var(--text-dim); margin-top:2px;}
.redemption-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-top:1px solid var(--border);}
.redemption-info{flex:1 1 auto; font-size:13px;}
.status-chip{font-size:11px; font-weight:800; border-radius:999px; padding:4px 10px; flex:0 0 auto;}
.status-pending{background:rgba(78,205,196,.14); color:var(--cyan);}
.status-done{background:rgba(255,200,87,.14); color:var(--gold);}

/* ---------- parent ---------- */
.seg{display:flex; background:var(--surface-2); border-radius:999px; padding:4px; margin-bottom:18px;}
.seg-item{flex:1 1 0; text-align:center; padding:9px 4px; border-radius:999px; font-weight:700; font-size:13.5px; cursor:pointer; color:var(--text-dim);}
.seg-item.active{background:var(--surface-3); color:var(--text);}
.child-pick{display:flex; gap:10px; margin-bottom:16px;}
.child-pick-item{
  flex:1 1 0; text-align:center; padding:10px 6px; border-radius:var(--r-md);
  background:var(--surface); border:2px solid var(--border); cursor:pointer; font-weight:700; font-size:14px;
}
.child-pick-item.active{border-color:var(--gold); color:var(--gold);}
.approve-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-top:1px solid var(--border);}
.approve-info{flex:1 1 auto; font-size:14px;}
.approve-pts{font-size:12px; color:var(--gold); font-weight:700;}
.mini-stat{display:flex; justify-content:space-between; padding:7px 0; font-size:14px;}
.mini-stat b{color:var(--gold);}
.manage-section{margin-bottom:22px;}
.manage-row{display:flex; align-items:center; gap:8px; padding:8px 0; border-top:1px solid var(--border);}
.avatar-edit-block{border-top:1px solid var(--border); padding:8px 0;}
.avatar-img-actions{display:flex; gap:8px; padding:6px 0 2px 50px;}
.manage-hint{color:var(--text-faint); font-size:12.5px; padding-bottom:8px;}
.field{
  background:var(--surface-2); border:1px solid var(--border); color:var(--text);
  border-radius:var(--r-sm); padding:8px 10px; font-size:13.5px; width:100%;
}
.field-name{flex:1 1 auto;}
.field-pts{width:64px; flex:0 0 auto; text-align:center;}
.add-form{display:flex; gap:6px; margin-top:10px;}
.add-form input{flex:1 1 auto;}
.code-row{display:flex; align-items:center; gap:10px; padding:8px 0;}
.code-row label{flex:1 1 auto; font-size:14px; font-weight:600; color:var(--text-dim);}
.code-row input{width:90px; text-align:center; letter-spacing:3px;}
.empty-note{color:var(--text-faint); font-size:13px; text-align:center; padding:14px 0;}
.tag-pink{color:var(--pink);}
.tag-blue{color:var(--blue);}

.toast{
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  background:var(--surface-3); color:var(--text); padding:10px 18px;
  border-radius:999px; font-size:13px; font-weight:600; z-index:50;
  box-shadow:0 6px 20px rgba(0,0,0,.4);
  opacity:0; transition:opacity .25s;
  max-width:90%; text-align:center;
}
.toast.show{opacity:1;}
</style>

/* =========================================================
   STATE + SYNC (no Claude account needed)
   This app syncs between devices using your own free
   Firebase Realtime Database. The database URL is stored
   locally on each device (localStorage) so you only enter
   it once per device, then everything else is automatic.
   ========================================================= */
let state = null;
let saving = false;
let syncBucket = null; // the family's Firebase Realtime Database URL
const avatarImages = {}; // tier -> dataURL, loaded lazily from the sync backend

function ensureShape(s){
  const d = defaultState();
  if(!s) return d;
  s.tasks = Array.isArray(s.tasks) ? s.tasks : d.tasks;
  s.prizes = Array.isArray(s.prizes) ? s.prizes : d.prizes;
  s.avatars = Array.isArray(s.avatars) && s.avatars.length===13 ? s.avatars : d.avatars;
  s.avatars.forEach(a=>{ if(typeof a.hasImg!=='boolean') a.hasImg=false; });
  s.parentCode = s.parentCode || d.parentCode;
  s.children = s.children || {};
  ['lihi','itai'].forEach(cid=>{
    const base = d.children[cid];
    const c = s.children[cid];
    s.children[cid] = Object.assign({}, base, c||{});
    if(!Array.isArray(s.children[cid].avatarOwned)) s.children[cid].avatarOwned=[0];
    if(!s.children[cid].days) s.children[cid].days={};
    if(!Array.isArray(s.children[cid].avatarPurchases)) s.children[cid].avatarPurchases=[];
    if(!Array.isArray(s.children[cid].prizeRedemptions)) s.children[cid].prizeRedemptions=[];
  });
  return s;
}

function getSavedDbUrl(){
  try{ return localStorage.getItem('questar_db_url'); }catch(e){ return null; }
}
function saveDbUrl(url){
  try{ localStorage.setItem('questar_db_url', url); }catch(e){}
}
function normalizeDbUrl(url){
  return String(url||'').trim().replace(/\/+$/,'');
}

function fbUrl(base, key){
  return base + '/' + key + '.json';
}
async function kvGet(base, key){
  const res = await fetch(fbUrl(base, key));
  if(!res.ok) throw new Error('get failed: '+res.status);
  const text = await res.text();
  if(text==='null' || text==='') return null;
  return JSON.parse(text);
}
async function kvSet(base, key, value){
  const res = await fetch(fbUrl(base, key), {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(value)
  });
  if(!res.ok) throw new Error('set failed: '+res.status);
  return true;
}
async function kvDelete(base, key){
  try{ await fetch(fbUrl(base, key), {method:'DELETE'}); }catch(e){}
}

async function saveState(){
  if(!state || !syncBucket) return;
  try{
    saving = true;
    await kvSet(syncBucket, 'state', state);
  }catch(e){
    showToast('השמירה לא הסתנכרנה - בדקו חיבור לאינטרנט');
  }finally{
    saving = false;
  }
}

async function loadAllAvatarImages(onlyMissing){
  const jobs = state.avatars
    .filter(a=>a.hasImg && (!onlyMissing || !avatarImages[a.tier]))
    .map(async a=>{
      try{
        const val = await kvGet(syncBucket, 'avimg_'+a.tier);
        if(val) avatarImages[a.tier]=val;
      }catch(e){ /* ignore, will retry on next poll */ }
    });
  await Promise.all(jobs);
}

function startPolling(){
  setInterval(async ()=>{
    if(saving || !syncBucket) return;
    try{
      const raw = await kvGet(syncBucket, 'state');
      if(raw){
        const incoming = ensureShape(raw);
        const incomingStr = JSON.stringify(incoming);
        if(incomingStr !== JSON.stringify(state)){
          state = incoming;
          await loadAllAvatarImages(true);
          render();
        }
      }
    }catch(e){ /* offline - keep showing last known data */ }
  }, 20000);
}

function maxDailyStars(){

function dayData(child, ds){
  if(!child.days[ds]) child.days[ds] = {tasks:{}};

function dayEarned(child, ds){

function pendingPrizeCount(child){
  return child.prizeRedemptions.filter(r=>r.status==='pending').length;
}
function lastNDays(n){
  const out=[];
  const d = new Date();
  for(let i=0;i<n;i++){
    out.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
    d.setDate(d.getDate()-1);
  }
  return out;
}

function showToast(msg){

async function submitDbUrl(){
  const input = document.getElementById('dbUrlInput');
  const url = normalizeDbUrl(input && input.value);
  if(!url){ setupError='הקלידו כתובת'; render(); return; }
  if(url.indexOf('console.firebase.google.com')!==-1){
    setupError = 'זו כתובת לעמוד הניהול, לא כתובת מסד הנתונים. חפשו בעמוד את הכתובת שמתחילה ב-https ומסתיימת ב-firebaseio.com (או firebasedatabase.app).';
    render();
    return;
  }
  setupError='';
  setupMode='connecting'; render();
  try{
    const raw = await kvGet(url, 'state');
    syncBucket = url;
    if(raw){ state = ensureShape(raw); }
    else { state = defaultState(); await kvSet(url, 'state', state); }
    saveDbUrl(url);
    await loadAllAvatarImages();
    view='login';
    render();
    startPolling();
  }catch(e){
    syncBucket = null;
    setupMode='choose';
    setupError = 'לא הצלחנו להתחבר. בדקו שהכתובת נכונה, שיש חיבור לאינטרנט, ושכללי הגישה (Rules) ב-Firebase מוגדרים לקריאה וכתיבה חופשית.';
    render();
  }
}

  const keypad = keys.map(k=>{

    return `<div class="key" onclick="enterDigit('${k}')">${k}</div>`;
  }).join('');

function goLogin(){ view='login'; passInput=''; passError=false; render(); }
function enterDigit(d){
  if(passInput.length>=4) return;
  passInput += d;
  passError = false;
  if(passInput.length===4) checkPasscode();
  else render();
}
function backspaceDigit(){
  passInput = passInput.slice(0,-1);
  passError = false;
  render();
}
function checkPasscode(){
  let correct;
  if(passTarget==='parent') correct = state.parentCode;
  else correct = state.children[passTarget].code;
  if(passInput===correct){
    if(passTarget==='parent'){
      view='parent'; parentTab='dashboard';
    }else{
      currentChild = passTarget; childTab='tasks'; openCats={org:true};
      view='child';
    }
    passInput=''; passError=false;
    render();
  }else{
    passError = true;
    render();
    setTimeout(()=>{ passInput=''; passError=false; render(); }, 650);
  }
}

function renderTasksTab(c){

    html += `<div class="card" style="background:rgba(78,205,196,.08); border-color:rgba(78,205,196,.3);">

      <span style="font-size:13.5px;"> ${pending} משימות מחכות לאישור הורה</span>
    </div>`;
  }
  CATEGORIES.forEach(cat=>{
    const tasks = state.tasks.filter(t=>t.cat===cat.id);
    if(tasks.length===0) return;
    const doneCount = tasks.filter(t=>dd.tasks[t.id]==='approved').length;
    const open = !!openCats[cat.id];
    const pips = tasks.map(t=>`<div class="pip ${dd.tasks[t.id]==='approved'?'filled':''}"></div>`).join('');
    html += `<div class="card cat-card">
      <div class="cat-head" onclick="toggleCat('${cat.id}')">

}
function renderTaskRow(t, dd){
  const status = dd.tasks[t.id];
  let btn;
  if(status==='approved') btn = `<button class="btn btn-disabled btn-sm">${ic('check','style="width:14px;height:14px;"')} בוצע</button>`;
  else if(status==='pending') btn = `<button class="btn btn-disabled btn-sm">${ic('clock','style="width:14px;height:14px;"')} מחכה לאישור</button>`;
  else btn = `<button class="btn btn-cyan btn-sm" onclick="markTaskDone('${t.id}')">סמן כבוצע</button>`;
  return `<div class="task-row">
    <div class="task-name">${t.name}</div>
    <div class="task-pts">+${t.pts} ${starIcon('style="width:10px;height:10px;vertical-align:-1px;"')}</div>
    <div class="task-action">${btn}</div>
  </div>`;
}

function markTaskDone(taskId){

function renderAvatarTab(c){

      <div class="avatar-name">${a.name}</div>

function buyAvatar(tier){
  const c = state.children[currentChild];
  const a = state.avatars.find(x=>x.tier===tier);

  if(c.totalStars < a.cost) return;
  c.totalStars -= a.cost;
  c.avatarOwned.push(tier);
  c.avatarEquipped = tier;
  c.avatarPurchases.push({tier, cost:a.cost, date:new Date().toISOString()});

  render();

}

}

  render();
}

function escapeAttr(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');

function updateTaskField(id, field, val){
  const t = state.tasks.find(x=>x.id===id);
  if(!t) return;
  if(field==='pts') t.pts = Math.max(0, parseInt(val)||0);
  else t.name = val;
  saveState();
  render();
}
function deleteTask(id){
  state.tasks = state.tasks.filter(t=>t.id!==id);

function handleAvatarImageUpload(tier, inputEl){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){
    showToast('יש לבחור קובץ תמונה');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const size = 160;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const side = Math.min(img.width, img.height);
      const sx = (img.width-side)/2, sy = (img.height-side)/2;
      ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
      let dataUrl = canvas.toDataURL('image/jpeg', 0.75);
      if(dataUrl.length > 14000){
        dataUrl = canvas.toDataURL('image/jpeg', 0.5);
      }
      if(dataUrl.length > 14000){
        const canvas2 = document.createElement('canvas');
        canvas2.width = 100; canvas2.height = 100;
        canvas2.getContext('2d').drawImage(canvas, 0, 0, 100, 100);
        dataUrl = canvas2.toDataURL('image/jpeg', 0.5);
      }
      if(dataUrl.length > 15500){
        showToast('התמונה גדולה מהצפוי, נסו תמונה אחרת');
        return;
      }
      const a = state.avatars.find(x=>x.tier===tier);
      if(a){
        a.hasImg = true;
        avatarImages[tier] = dataUrl;
        saveState();
        render();
        showToast('התמונה הוחלפה');
        kvSet(syncBucket, 'avimg_'+tier, dataUrl).catch(()=>{
          showToast('שמירת התמונה לא הסתנכרנה - בדקו חיבור');
        });
      }
    };
    img.onerror = function(){ showToast('לא הצלחנו לקרוא את התמונה'); };
    img.src = e.target.result;
  };
  reader.onerror = function(){ showToast('לא הצלחנו לקרוא את הקובץ'); };
  reader.readAsDataURL(file);
}
function resetAvatarImage(tier){
  const a = state.avatars.find(x=>x.tier===tier);
  if(!a) return;
  a.hasImg = false;
  delete avatarImages[tier];
  saveState();
  render();
  showToast('חזרנו לעיצוב המקורי');
  kvDelete(syncBucket, 'avimg_'+tier);
}
function saveCodes(){
  const l = document.getElementById('codeLihi').value.trim();
  const i = document.getElementById('codeItai').value.trim();
  const p = document.getElementById('codeParent').value.trim();
  if(l.length===4) state.children.lihi.code = l;
  if(i.length===4) state.children.itai.code = i;
  if(p.length===4) state.parentCode = p;
  saveState();
  render();
  showToast('הקודים נשמרו');
}

/* =========================================================
   INIT
   ========================================================= */
async function init(){
  const saved = getSavedDbUrl();
  if(!saved){
    view='setup'; setupMode='choose';
    render();
    return;
  }
  syncBucket = saved;
  view='loading';
  render();
  try{
    const raw = await kvGet(syncBucket, 'state');
    if(raw){ state = ensureShape(raw); }
    else { state = defaultState(); await kvSet(syncBucket, 'state', state); }
    await loadAllAvatarImages();
  }catch(e){
    state = defaultState();
    showToast('אין חיבור לרשת כרגע - מציגים נתונים מקומיים');
  }
  view='login';
  render();
  startPolling();
}
init();
</script>
